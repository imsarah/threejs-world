<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>threejs-world</title>
    <link rel="stylesheet" href="./src/desktop.css" />
  </head>
  <body>
    <div id="app"></div>
    <div id="boot">
      <div class="title">threejs-world</div>
      <div id="boot-msg">initializing</div>
      <div class="bar"><div id="boot-bar"></div></div>
    </div>
    <div id="chooser">
      <div class="title">threejs-world</div>
      <div class="sub">choose an experience</div>
      <div class="btns">
        <button id="choose-desktop" type="button">
          <span class="b-title">Desktop</span>
          <span class="b-sub">full WebGPU world &middot; Chrome on a computer</span>
        </button>
        <button id="choose-mobile" type="button">
          <span class="b-title">Mobile</span>
          <span class="b-sub">lightweight scene &middot; phone or any browser</span>
        </button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
